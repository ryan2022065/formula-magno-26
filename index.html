<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Fórmula Magno 26 - Pro Simulator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #speedometer { position: absolute; bottom: 20px; right: 20px; font-size: 2em; font-family: monospace; color: #e10600; }
        #gps { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 12px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>

<body>
    <div id="info">
        <h1 style="font-style: italic;">FÓRMULA MAGNO 26</h1>
        <p>WSAD para dirigir | C: Mudar Câmera | R: Resetar</p>
    </div>
    <div id="gps">Aguardando GPS...</div>
    <div id="speedometer">0 KM/H</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.6.8/build/index.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { computeBoundsTree, disposeBoundsTree, acceleratedRaycast } from 'three-mesh-bvh';

        THREE.BufferGeometry.prototype.computeBoundsTree = computeBoundsTree;
        THREE.BufferGeometry.prototype.disposeBoundsTree = disposeBoundsTree;
        THREE.Mesh.prototype.raycast = acceleratedRaycast;

        let camera, scene, renderer, car;
        let speed = 0, angle = 0;
        let cameraMode = 'cockpit'; 
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false };

       // --- CONFIGURAÇÃO DO SPAWNPOINT (RETA PRINCIPAL) ---
        const spawnPoint = new THREE.Vector3(153, 10, -176);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 50, 2000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 4000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            const sunLight = new THREE.DirectionalLight(0xffffff, 3);
            sunLight.position.set(100, 300, 100);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            let trackMesh; // Adicione esta variável lá no topo com os outros 'let'

loader.load('japan.glb', (gltf) => {
    const track = gltf.scene;
    track.traverse((child) => {
        if (child.isMesh) {
            child.geometry.computeBoundsTree();
            trackMesh = child; // Importante para as paredes!
        }
    });
    scene.add(track);
});

            loader.load('carro.glb', (gltf) => {
                car = gltf.scene;
                resetCar();
                scene.add(car);
            });

            window.addEventListener('keydown', (e) => { 
                if(e.key in keys) keys[e.key] = true; 
                if(e.key.toLowerCase() === 'r') resetCar(); 
            });
            window.addEventListener('keyup', (e) => { if(e.key in keys) keys[e.key] = false; });

            animate();
        }

        function resetCar() {
            if (car) {
                car.position.copy(spawnPoint);
                speed = 0;
                angle = 0;
                car.rotation.set(0, 0, 0);
            }
        }

        // Função para ignorar o próprio carro na colisão
        function isChildOf(object, parent) {
            while (object !== null) {
                if (object === parent) return true;
                object = object.parent;
            }
            return false;
        }

       function updatePhysics() {
    if (!car || !trackMesh) return;

    // --- 1. GRUDE TOTAL NO CHÃO ---
    const groundRay = new THREE.Raycaster();
    groundRay.set(new THREE.Vector3(car.position.x, car.position.y + 1, car.position.z), new THREE.Vector3(0, -1, 0));
    const groundHit = groundRay.intersectObject(trackMesh);

    if (groundHit.length > 0) {
        const dist = groundHit[0].distance;
        // Se estiver perto do asfalto, ele "puxa" o carro para baixo (1.0 é a altura do eixo do carro)
        if (dist < 1.2) {
            car.position.y -= (dist - 1.0); 
        } else {
            car.position.y -= 0.2; // Gravidade se pular
        }
    }

    // --- 2. SISTEMA ANTI-ATRAVESSAR PAREDES ---
    // Criamos 3 sensores: Frente, Esquerda e Direita
    const directions = [
        new THREE.Vector3(0, 0, 1),   // Sensor Frente
        new THREE.Vector3(1, 0, 0.5), // Sensor Diagonal Direita
        new THREE.Vector3(-1, 0, 0.5) // Sensor Diagonal Esquerda
    ];

    directions.forEach(dir => {
        const ray = new THREE.Raycaster();
        // Faz o sensor girar junto com o bico do carro
        const rotatedDir = dir.clone().applyQuaternion(car.quaternion);
        ray.set(car.position, rotatedDir);
        
        const collision = ray.intersectObject(trackMesh);

        // Se detectar parede a menos de 1.5 metros
        if (collision.length > 0 && collision[0].distance < 1.5) {
            speed *= -0.5; // O carro "bate" e perde velocidade
            // Empurra o carro para fora da parede usando a "normal" da face que ele bateu
            car.position.add(collision[0].face.normal.multiplyScalar(0.1));
        }
    });

    if (car.position.y < -50) resetCar();
}
        function animate() {
            requestAnimationFrame(animate);

            if (car) {
                if (keys.w || keys.ArrowUp) speed += 0.01;
                else if (keys.ArrowDown || keys.s) speed -= 0.02;
                else speed *= 0.97;

                if (speed > 2.0) speed = 2.0;
                if (speed < -0.4) speed = -0.4;

                if (Math.abs(speed) > 0.01) {
                    const steer = 0.04;
                    if (keys.a) angle += steer;
                    if (keys.d) angle -= steer;
                }

                car.rotation.y = angle;
                car.position.x += Math.sin(angle) * speed;
                car.position.z += Math.cos(angle) * speed;

                updatePhysics();

                // MOSTRA GPS NA TELA
                document.getElementById('gps').innerText = `GPS - X: ${Math.floor(car.position.x)} | Z: ${Math.floor(car.position.z)}`;

                if (cameraMode === 'cockpit') {
                    const cockpitOffset = new THREE.Vector3(0, 1.1, -0.2).applyQuaternion(car.quaternion);
                    camera.position.copy(car.position).add(cockpitOffset);
                    camera.lookAt(car.position.clone().add(new THREE.Vector3(0, 0.5, 5).applyQuaternion(car.quaternion)));
                } else {
                    const wingOffset = new THREE.Vector3(0, 1.6, -4.5).applyQuaternion(car.quaternion);
                    camera.position.copy(car.position).add(wingOffset);
                    camera.lookAt(car.position);
                }

                document.getElementById('speedometer').innerText = `${Math.floor(speed * 150)} KM/H`;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') cameraMode = (cameraMode === 'cockpit') ? 'wing' : 'cockpit';
        });

        init();
    </script>
</body>
</html>
