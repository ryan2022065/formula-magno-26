<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Fórmula Magno 26 - Pro Simulator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #speedometer { position: absolute; bottom: 20px; right: 20px; font-size: 2em; font-family: monospace; color: #e10600; }
    </style>
</head>

<body>
    <div id="info">
        <h1 style="font-style: italic;">FÓRMULA MAGNO 26</h1>
        <p>WSAD para dirigir | C: Mudar Câmera</p>
    </div>
    <div id="speedometer">0 KM/H</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.6.8/build/index.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { computeBoundsTree, disposeBoundsTree, acceleratedRaycast } from 'three-mesh-bvh';

        // Ativar extensões de física
        THREE.BufferGeometry.prototype.computeBoundsTree = computeBoundsTree;
        THREE.BufferGeometry.prototype.disposeBoundsTree = disposeBoundsTree;
        THREE.Mesh.prototype.raycast = acceleratedRaycast;

        let camera, scene, renderer, car, trackMesh;
        let speed = 0, angle = 0;
        let cameraMode = 'cockpit'; 
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 50, 1000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            const sunLight = new THREE.DirectionalLight(0xffffff, 3);
            sunLight.position.set(10, 50, 10);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));

            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            // Carregar Pista com Física
            loader.load('japan.glb', (gltf) => {
                const track = gltf.scene;
                track.traverse((child) => {
                    if (child.isMesh) {
                        child.geometry.computeBoundsTree(); // Cria a "caixa de colisão"
                        trackMesh = child; // Guarda a referência para a física
                    }
                });
                scene.add(track);
            });

            // Carregar Carro
            loader.load('carro.glb', (gltf) => {
                car = gltf.scene;
                car.position.set(0, 2, 0); // Começa um pouco no ar para cair na pista
                scene.add(car);
            });

            window.addEventListener('keydown', (e) => { if(e.key in keys) keys[e.key] = true; });
            window.addEventListener('keyup', (e) => { if(e.key in keys) keys[e.key] = false; });

            animate();
        }

        function updatePhysics() {
            if (!car || !trackMesh) return;

            // Raycaster: Um "laser" que aponta para baixo do carro para achar o chão
            const raycaster = new THREE.Raycaster();
            raycaster.firstHitOnly = true;
            raycaster.set(new THREE.Vector3(car.position.x, car.position.y + 1, car.position.z), new THREE.Vector3(0, -1, 0));

            const hit = raycaster.intersectObject(trackMesh);

            if (hit.length > 0) {
                const groundY = hit[0].point.y;
                // Se o carro estiver abaixo do chão ou muito perto, ele gruda no asfalto
                if (car.position.y < groundY + 0.1) {
                    car.position.y = groundY + 0.1;
                } else {
                    car.position.y -= 0.1; // Gravidade simples
                }
            } else {
                car.position.y -= 0.2; // Queda livre se sair da pista
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (car) {
                // Controles de movimento
                if (keys.w || keys.ArrowUp) speed += 0.008;
                else if (keys.ArrowDown || keys.s) speed -= 0.01;
                else speed *= 0.98;

                if (speed > 1.5) speed = 1.5;
                if (speed < -0.2) speed = -0.2;

                if (Math.abs(speed) > 0.01) {
                    if (keys.a) angle += 0.04;
                    if (keys.d) angle -= 0.04;
                }

                car.rotation.y = angle;
                car.position.x += Math.sin(angle) * speed;
                car.position.z += Math.cos(angle) * speed;

                updatePhysics(); // Chama a função de colisão

                // Câmeras
                if (cameraMode === 'cockpit') {
                    const cockpitOffset = new THREE.Vector3(0, 1.1, -0.2).applyQuaternion(car.quaternion);
                    camera.position.copy(car.position).add(cockpitOffset);
                    camera.lookAt(car.position.clone().add(new THREE.Vector3(0, 0.5, 5).applyQuaternion(car.quaternion)));
                } else {
                    const wingOffset = new THREE.Vector3(0, 1.6, -4.5).applyQuaternion(car.quaternion);
                    camera.position.copy(car.position).add(wingOffset);
                    camera.lookAt(car.position);
                }

                document.getElementById('speedometer').innerText = `${Math.floor(speed * 220)} KM/H`;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') cameraMode = (cameraMode === 'cockpit') ? 'wing' : 'cockpit';
        });

        init();
    </script>
</body>
</html>
