<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Fórmula Magno 26 - Pro Simulator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #speedometer { position: absolute; bottom: 20px; right: 20px; font-size: 2em; font-family: monospace; color: #e10600; }
        #gps { position: absolute; top: 10px; left: 10px; font-family: monospace; font-size: 12px; color: #fff; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>

<body>
    <div id="info">
        <h1 style="font-style: italic;">FÓRMULA MAGNO 26</h1>
        <p>WSAD para dirigir | C: Mudar Câmera | R: Resetar</p>
    </div>
    <div id="gps">Aguardando GPS...</div>
    <div id="speedometer">0 KM/H</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.6.8/build/index.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
        import { computeBoundsTree, disposeBoundsTree, acceleratedRaycast } from 'three-mesh-bvh';

        THREE.BufferGeometry.prototype.computeBoundsTree = computeBoundsTree;
        THREE.BufferGeometry.prototype.disposeBoundsTree = disposeBoundsTree;
        THREE.Mesh.prototype.raycast = acceleratedRaycast;

        // --- VARIÁVEIS GLOBAIS ---
        let camera, scene, renderer, car, trackMesh; // CORREÇÃO 1: trackMesh agora é global
        let speed = 0, angle = 0;
        let cameraMode = 'cockpit'; 
        const keys = { w: false, a: false, s: false, d: false, arrowup: false, arrowdown: false, arrowleft: false, arrowright: false };

        const spawnPoint = new THREE.Vector3(153, 1, -176);

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 50, 2000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 4000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            const sunLight = new THREE.DirectionalLight(0xffffff, 3);
            sunLight.position.set(100, 300, 100);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));

            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            loader.load('japan.glb', (gltf) => {
                const track = gltf.scene;
                track.traverse((child) => {
                    if (child.isMesh) {
                        child.geometry.computeBoundsTree();
                        trackMesh = child; // CORREÇÃO 2: Salvando a malha da pista
                    }
                });
                scene.add(track);
            });

            loader.load('carro.glb', (gltf) => {
                car = gltf.scene;
                resetCar();
                scene.add(car);
            });

            // Gerenciador de teclas melhorado
            window.addEventListener('keydown', (e) => { 
                const key = e.key.toLowerCase();
                if(key in keys) keys[key] = true; 
                if(key === 'r') resetCar(); 
                if(key === 'c') cameraMode = (cameraMode === 'cockpit') ? 'wing' : 'cockpit';
            });
            window.addEventListener('keyup', (e) => { 
                const key = e.key.toLowerCase();
                if(key in keys) keys[key] = false; 
            });

            animate();
        }

        function resetCar() {
            if (car) {
                car.position.copy(spawnPoint);
                speed = 0;
                angle = 0;
                car.rotation.set(0, 0, 0);
            }
        }

        function updatePhysics() {
            if (!car || !trackMesh) return;

            // --- GRUDE 100% NO CHÃO ---
            const groundRay = new THREE.Raycaster();
            groundRay.set(new THREE.Vector3(car.position.x, car.position.y + 1, car.position.z), new THREE.Vector3(0, -1, 0));
            const groundHit = groundRay.intersectObject(trackMesh);

            if (groundHit.length > 0) {
                const dist = groundHit[0].distance;
                // Ajuste para o carro não tremer: cola ele na altura 1.0 do asfalto
                if (dist < 1.2) {
                    car.position.y -= (dist - 1.0);
                } else {
                    car.position.y -= 0.15; // Gravidade suave
                }
            }

            // --- SISTEMA DE COLISÃO COM PAREDES ---
            const directions = [
                new THREE.Vector3(0, 0, 1),   // Frente
                new THREE.Vector3(0.5, 0, 0.5), // Diagonal Direita
                new THREE.Vector3(-0.5, 0, 0.5) // Diagonal Esquerda
            ];

            directions.forEach(dir => {
                const wallRay = new THREE.Raycaster();
                const rotatedDir = dir.clone().applyQuaternion(car.quaternion);
                wallRay.set(car.position, rotatedDir);
                const collision = wallRay.intersectObject(trackMesh);

                if (collision.length > 0 && collision[0].distance < 1.8) {
                    speed *= -0.4; // Rebate ao bater
                    car.position.add(collision[0].face.normal.multiplyScalar(0.1)); // Empurra para fora da parede
                }
            });

            if (car.position.y < -30) resetCar();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (car) {
                // Aceleração
                if (keys.w || keys.arrowup) speed += 0.012;
                else if (keys.s || keys.arrowdown) speed -= 0.02;
                else speed *= 0.98;

                speed = Math.max(-0.4, Math.min(speed, 2.0));

                // Direção
                if (Math.abs(speed) > 0.01) {
                    const steer = 0.04;
                    if (keys.a || keys.arrowleft) angle += steer;
                    if (keys.d || keys.arrowright) angle -= steer;
                }

                car.rotation.y = angle;
                car.position.x += Math.sin(angle) * speed;
                car.position.z += Math.cos(angle) * speed;

                updatePhysics();

                document.getElementById('gps').innerText = `GPS - X: ${Math.floor(car.position.x)} | Z: ${Math.floor(car.position.z)}`;

                // Câmeras
                if (cameraMode === 'cockpit') {
                    const cockpitOffset = new THREE.Vector3(0, 0.85, 0.1).applyQuaternion(car.quaternion);
                    camera.position.copy(car.position).add(cockpitOffset);
                    camera.lookAt(car.position.clone().add(new THREE.Vector3(0, 0.5, 5).applyQuaternion(car.quaternion)));
                } else {
                    const wingOffset = new THREE.Vector3(0, 1.4, -3.5).applyQuaternion(car.quaternion);
                    camera.position.copy(car.position).add(wingOffset);
                    camera.lookAt(car.position);
                }

                document.getElementById('speedometer').innerText = `${Math.floor(speed * 180)} KM/H`;
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
