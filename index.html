<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Fórmula Magno 26 - Pro Simulator</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #speedometer { position: absolute; bottom: 20px; right: 20px; font-size: 2em; font-family: monospace; color: #e10600; }
    </style>
</head>

<body>
    <div id="info">
        <h1 style="font-style: italic;">FÓRMULA MAGNO 26</h1>
        <p>WSAD para dirigir | SETA CIMA: Acelerar | SETA BAIXO: Frear | Tecla C: Mudar Câmera</p>
    </div>
    <div id="speedometer">0 KM/H</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        let camera, scene, renderer, car;
        let speed = 0, angle = 0;
        let cameraMode = 'cockpit'; 
        const wheels = [];

        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false };

        const tireSettings = {
            'Médio': { grip: 1.0, top: 1.2 }
        };

        function init() {
            scene = new THREE.Scene();
            // Cor do céu e neblina ajustadas para a pista
            scene.background = new THREE.Color(0x87CEEB); 
            scene.fog = new THREE.Fog(0x87CEEB, 50, 1000);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            document.body.appendChild(renderer.domElement);

            // Luzes aprimoradas para o cenário
            const sunLight = new THREE.DirectionalLight(0xffffff, 3);
            sunLight.position.set(10, 50, 10);
            scene.add(sunLight);
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));

            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            // --- CARREGADOR DA PISTA DO JAPÃO ---
            loader.load('japan.glb', (gltf) => {
                const track = gltf.scene;
                track.scale.set(1, 1, 1); 
                track.traverse((child) => {
                    if (child.isMesh) {
                        child.receiveShadow = true;
                        if(child.material) child.material.side = THREE.DoubleSide;
                    }
                });
                scene.add(track);
                console.log("Pista do Japão carregada!");
            });

            // --- CARREGADOR DO CARRO ---
            loader.load('carro.glb', (gltf) => {
                car = gltf.scene;
                car.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        if (child.name.toLowerCase().includes("body")) {
                            child.material.color.set(0xe10600);
                        }
                    }
                });
                // Posicionando o carro um pouco acima para não bugar no asfalto
                car.position.set(0, 0.1, 0); 
                scene.add(car);
            }, 
            (xhr) => { console.log('Carro: ' + (xhr.loaded / xhr.total * 100) + '%'); },
            (error) => {
                console.error("Erro no carro. Criando reserva.");
                createPlaceholder();
            });

            window.addEventListener('keydown', (e) => { if(e.key in keys) keys[e.key] = true; });
            window.addEventListener('keyup', (e) => { if(e.key in keys) keys[e.key] = false; });

            animate();
        }

        function createPlaceholder() {
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.5, 4),
                new THREE.MeshStandardMaterial({ color: 0xe10600 })
            );
            car = new THREE.Group();
            car.add(body);
            scene.add(car);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (car) {
                if (keys.w || keys.ArrowUp) speed += 0.008 * tireSettings['Médio'].grip;
                else if (keys.ArrowDown) speed -= 0.02;
                else if (keys.s) speed -= 0.005;
                else speed *= 0.98;

                if (speed > 1.5) speed = 1.5;
                if (speed < -0.2) speed = -0.2;

                if (Math.abs(speed) > 0.01) {
                    const steer = 0.04;
                    if (keys.a) angle += steer;
                    if (keys.d) angle -= steer;
                }

                car.rotation.y = angle;
                car.position.x += Math.sin(angle) * speed;
                car.position.z += Math.cos(angle) * speed;

                if (cameraMode === 'cockpit') {
                    // Visão T-Cam (Topo do Cockpit)
                    const cockpitOffset = new THREE.Vector3(0, 1.1, -0.2).applyQuaternion(car.quaternion);
                    camera.position.copy(car.position).add(cockpitOffset);
                    const lookTarget = new THREE.Vector3(0, 0.5, 5).applyQuaternion(car.quaternion);
                    camera.lookAt(car.position.clone().add(lookTarget));
                } else {
                    // Visão Asa Traseira
                    const wingOffset = new THREE.Vector3(0, 1.6, -4.5).applyQuaternion(car.quaternion);
                    camera.position.copy(car.position).add(wingOffset);
                    camera.lookAt(car.position.clone().add(new THREE.Vector3(0, 1.0, 2).applyQuaternion(car.quaternion)));
                }

                document.getElementById('speedometer').innerText = `${Math.floor(speed * 220)} KM/H`;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') {
                cameraMode = (cameraMode === 'cockpit') ? 'wing' : 'cockpit';
            }
        });

        init();
    </script>
</body>
</html>
