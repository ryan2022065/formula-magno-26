<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Fórmula Magno 26 - ULTIMATE PRO SIMULATOR</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        :root { --f1-red: #e10600; --f1-blue: #0000ff; --carbon: #15151e; --gold: #ffcf00; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; text-transform: uppercase; }
        
        /* OVERLAY PRINCIPAL */
        #game-ui { position: absolute; inset: 0; pointer-events: none; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* CABEÇALHO DE TELEMETRIA */
        #top-bar { display: flex; justify-content: space-between; align-items: flex-start; }
        .data-panel { background: rgba(0,0,0,0.85); border-top: 4px solid var(--f1-red); padding: 15px; min-width: 200px; backdrop-filter: blur(5px); }
        .label { font-size: 10px; color: #aaa; margin-bottom: 2px; }
        .value { font-size: 18px; font-weight: bold; font-family: monospace; }

        /* VELOCÍMETRO GIGANTE */
        #speed-display { align-self: flex-end; text-align: right; }
        #speed-num { font-size: 9rem; font-weight: 900; line-height: 0.7; font-style: italic; color: var(--f1-red); display: block; text-shadow: 4px 4px #000; }
        #speed-unit { font-size: 1.5rem; letter-spacing: 5px; }

        /* VOLANTE / DASHBOARD */
        #steering-wheel { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 400px; height: 100px; background: rgba(20,20,20,0.9); border-radius: 100px 100px 0 0; border: 2px solid #333; display: flex; justify-content: center; align-items: center; }
        .rev-light { width: 20px; height: 10px; margin: 0 5px; background: #222; border-radius: 2px; }

        /* LOADING SCREEN */
        #loading-screen { position: fixed; inset: 0; background: var(--carbon); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s; }
        .loader-bar { width: 300px; height: 4px; background: #333; margin-top: 20px; border-radius: 2px; overflow: hidden; }
        #loader-fill { width: 0%; height: 100%; background: var(--f1-red); transition: width 0.3s; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div style="font-size: 24px; letter-spacing: 10px; font-weight: 900;">FÓRMULA MAGNO 26</div>
        <div style="font-size: 12px; margin-top: 10px; color: var(--f1-red);">INICIALIZANDO MOTOR DE FÍSICA E GRÁFICOS</div>
        <div class="loader-bar"><div id="loader-fill"></div></div>
    </div>

    <div id="game-ui">
        <div id="top-bar">
            <div class="data-panel">
                <div class="label">LOCALIZAÇÃO GPS</div>
                <div class="value" id="gps-val">X: 000 | Z: 000</div>
                <div class="label" style="margin-top:10px;">TEMPERATURA PNEUS</div>
                <div id="tyre-status" style="color: #0f0;">OPTIMAL - 95°C</div>
            </div>
            <div class="data-panel" style="border-top-color: var(--gold);">
                <div class="label">SISTEMA ERS / KERS</div>
                <div class="bar-container" style="height:10px; background:#222; margin-top:5px;">
                    <div id="ers-bar" style="width:100%; height:100%; background:var(--gold);"></div>
                </div>
                <div class="label" style="margin-top:10px;">MODO DE CÂMERA</div>
                <div class="value" id="cam-display">DYNAMIC_COCKPIT</div>
            </div>
        </div>

        <div id="speed-display">
            <div style="display:flex; justify-content: flex-end; align-items: baseline;">
                <span id="gear-val" style="font-size: 4rem; margin-right: 20px; color: #fff;">N</span>
                <span id="speed-num">000</span>
            </div>
            <span id="speed-unit">KILOMETERS PER HOUR</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        /* * ==========================================
         * MOTOR DE JOGO PROFISSIONAL - MAGNO 26
         * ==========================================
         * Desenvolvido para simulação de alto desempenho
         */

        class RacingSimulator {
            constructor() {
                // Configurações Globais
                this.container = document.body;
                this.clock = new THREE.Clock();
                this.isPaused = false;
                
                // Parâmetros de Performance do Carro
                this.carParams = {
                    speed: 0,
                    acceleration: 0.022,
                    braking: 0.045,
                    maxSpeed: 3.2,
                    drag: 0.985,
                    angle: 0,
                    steeringFactor: 0.04,
                    grip: 0.95,
                    suspensionPitch: 0,
                    suspensionRoll: 0,
                    ersLevel: 100
                };

                // Teclas e Input
                this.input = {
                    up: false, down: false, left: false, right: false, 
                    shift: false, cam: false, reset: false
                };

                // Referências de Objetos
                this.car = null;
                this.track = null;
                this.physicsObjects = [];
                this.camMode = 'cockpit'; // cockpit | wing | orbital
                this.spawn = new THREE.Vector3(153, 10, -176);

                // Inicializar
                this.setupScene();
                this.setupLights();
                this.loadAssets();
                this.bindControls();
            }

            setupScene() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x7fb8eb);
                this.scene.fog = new THREE.Fog(0x7fb8eb, 50, 4000);

                this.camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
                
                this.renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.0;
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.container.appendChild(this.renderer.domElement);
            }

            setupLights() {
                const ambient = new THREE.AmbientLight(0xffffff, 0.8);
                this.scene.add(ambient);

                this.sun = new THREE.DirectionalLight(0xffffff, 2.5);
                this.sun.position.set(500, 1000, 250);
                this.sun.castShadow = true;
                this.sun.shadow.camera.left = -1000;
                this.sun.shadow.camera.right = 1000;
                this.sun.shadow.camera.top = 1000;
                this.sun.shadow.camera.bottom = -1000;
                this.sun.shadow.mapSize.width = 2048;
                this.sun.shadow.mapSize.height = 2048;
                this.scene.add(this.sun);

                const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
                this.scene.add(hemi);
            }

            loadAssets() {
                const draco = new DRACOLoader();
                draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
                
                const loader = new GLTFLoader();
                loader.setDRACOLoader(draco);

                // Gerenciador de progresso
                const manager = new THREE.LoadingManager();
                manager.onProgress = (url, loaded, total) => {
                    const prog = (loaded / total) * 100;
                    document.getElementById('loader-fill').style.width = prog + '%';
                };

                // Carregar Pista
                loader.load('japan.glb', (gltf) => {
                    this.track = gltf.scene;
                    this.track.traverse(node => {
                        if (node.isMesh) {
                            node.receiveShadow = true;
                            this.physicsObjects.push(node);
                        }
                    });
                    this.scene.add(this.track);

                    // Carregar Carro
                    loader.load('carro.glb', (carGltf) => {
                        this.car = carGltf.scene;
                        this.car.traverse(node => {
                            if (node.isMesh) node.castShadow = true;
                        });
                        this.scene.add(this.car);
                        this.resetCar();
                        
                        // Finalizar Loading
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.opacity = '0';
                            this.run();
                        }, 1000);
                    });
                });
            }

            bindControls() {
                window.addEventListener('keydown', (e) => this.handleKey(e, true));
                window.addEventListener('keyup', (e) => this.handleKey(e, false));
                window.addEventListener('resize', () => this.onResize());
            }

            handleKey(e, isDown) {
                const k = e.key.toLowerCase();
                if (k === 'w' || k === 'arrowup') this.input.up = isDown;
                if (k === 's' || k === 'arrowdown') this.input.down = isDown;
                if (k === 'a' || k === 'arrowleft') this.input.left = isDown;
                if (k === 'd' || k === 'arrowright') this.input.right = isDown;
                if (k === 'shift') this.input.shift = isDown;
                if (isDown && k === 'c') this.cycleCamera();
                if (isDown && k === 'r') this.resetCar();
            }

            cycleCamera() {
                const modes = ['cockpit', 'wing', 'orbital'];
                this.camMode = modes[(modes.indexOf(this.camMode) + 1) % modes.length];
                document.getElementById('cam-display').innerText = this.camMode.toUpperCase();
            }

            resetCar() {
                this.car.position.copy(this.spawn);
                this.car.rotation.set(0, 0, 0);
                this.carParams.speed = 0;
                this.carParams.angle = 0;
            }

            // --- MOTOR DE FÍSICA E COLISÃO ---
            updatePhysics(delta) {
                const p = this.carParams;
                
                // 1. Aceleração e Frenagem
                if (this.input.up) {
                    p.speed += p.acceleration;
                    p.suspensionPitch = THREE.MathUtils.lerp(p.suspensionPitch, 0.05, 0.1);
                } else if (this.input.down) {
                    p.speed -= p.braking;
                    p.suspensionPitch = THREE.MathUtils.lerp(p.suspensionPitch, -0.08, 0.1);
                } else {
                    p.speed *= p.drag;
                    p.suspensionPitch = THREE.MathUtils.lerp(p.suspensionPitch, 0, 0.1);
                }

                // Limites
                p.speed = Math.max(-0.6, Math.min(p.speed, p.maxSpeed));

                // 2. Direção (Steering)
                if (Math.abs(p.speed) > 0.02) {
                    const steerRes = 0.04 - (Math.abs(p.speed) * 0.005);
                    if (this.input.left) {
                        p.angle += steerRes;
                        p.suspensionRoll = THREE.MathUtils.lerp(p.suspensionRoll, 0.06, 0.1);
                    } else if (this.input.right) {
                        p.angle -= steerRes;
                        p.suspensionRoll = THREE.MathUtils.lerp(p.suspensionRoll, -0.06, 0.1);
                    } else {
                        p.suspensionRoll = THREE.MathUtils.lerp(p.suspensionRoll, 0, 0.1);
                    }
                }

                // 3. Aplicação de Movimento
                this.car.rotation.y = p.angle;
                // Aplicar inclinações visuais (Pitch e Roll)
                this.car.rotation.x = p.suspensionPitch;
                this.car.rotation.z = p.suspensionRoll;

                this.car.position.x += Math.sin(p.angle) * p.speed;
                this.car.position.z += Math.cos(p.angle) * p.speed;

                this.checkCollisions();
            }

            checkCollisions() {
                if (!this.car || !this.track) return;

                // A. DETECÇÃO DE CHÃO (Gravity Raycast)
                const groundOrigin = new THREE.Vector3(this.car.position.x, this.car.position.y + 2, this.car.position.z);
                const rayGround = new THREE.Raycaster(groundOrigin, new THREE.Vector3(0, -1, 0), 0, 5);
                const hits = rayGround.intersectObject(this.track, true);

                if (hits.length > 0) {
                    const dist = hits[0].point.y;
                    if (this.car.position.y < dist + 0.1) {
                        this.car.position.y = dist + 0.1;
                    } else {
                        this.car.position.y -= 0.15; // Gravidade
                    }
                } else {
                    this.car.position.y -= 0.5; // Queda livre
                }

                // B. DETECÇÃO DE PAREDE PRO (6 SENSORES)
                const sensorHeight = 0.65; // Altura ideal para ignorar o asfalto mas pegar muretas
                const sensors = [
                    new THREE.Vector3(0, sensorHeight, 1.8),   // Frente
                    new THREE.Vector3(0.8, sensorHeight, 0.8), // Lateral Dir
                    new THREE.Vector3(-0.8, sensorHeight, 0.8),// Lateral Esq
                    new THREE.Vector3(0, sensorHeight, -1.0)   // Trás
                ];

                sensors.forEach(offset => {
                    const worldPos = offset.clone().applyQuaternion(this.car.quaternion).add(this.car.position);
                    const dir = offset.clone().applyQuaternion(this.car.quaternion).normalize();
                    const ray = new THREE.Raycaster(this.car.position.clone().add(new THREE.Vector3(0, sensorHeight, 0)), dir, 0, 2.2);
                    
                    const collision = ray.intersectObject(this.track, true);
                    if (collision.length > 0) {
                        // Se bater numa face vertical (Parede)
                        if (Math.abs(collision[0].face.normal.y) < 0.6) {
                            this.carParams.speed *= -0.5; // Rebote
                            this.car.position.add(collision[0].face.normal.multiplyScalar(0.2));
                        }
                    }
                });

                if (this.car.position.y < -50) this.resetCar();
            }

            updateCamera() {
                const p = this.carParams;
                let targetPos = new THREE.Vector3();
                let lookPos = new THREE.Vector3();

                if (this.camMode === 'cockpit') {
                    // Câmera TV Pod Realista
                    const offset = new THREE.Vector3(0, 0.82, 0.3).applyQuaternion(this.car.quaternion);
                    targetPos.copy(this.car.position).add(offset);
                    lookPos.copy(this.car.position).add(new THREE.Vector3(Math.sin(p.angle)*15, 0.5, Math.cos(p.angle)*15));
                    this.camera.fov = 65;
                } else if (this.camMode === 'wing') {
                    // Câmera Perseguição T-Cam
                    const offset = new THREE.Vector3(-Math.sin(p.angle)*5, 2.2, -Math.cos(p.angle)*5);
                    targetPos.copy(this.car.position).add(offset);
                    lookPos.copy(this.car.position).add(new THREE.Vector3(0, 0.8, 0));
                    this.camera.fov = 55;
                } else {
                    // Câmera Orbital Livre
                    const offset = new THREE.Vector3(-Math.sin(p.angle)*12, 6, -Math.cos(p.angle)*12);
                    targetPos.copy(this.car.position).add(offset);
                    lookPos.copy(this.car.position);
                    this.camera.fov = 45;
                }

                this.camera.position.lerp(targetPos, 0.15);
                this.camera.lookAt(lookPos);
                this.camera.updateProjectionMatrix();
            }

            updateHUD() {
                const kmh = Math.floor(Math.abs(this.carParams.speed) * 168);
                document.getElementById('speed-num').innerText = kmh.toString().padStart(3, '0');
                
                // Lógica de Marchas
                let gear = 'N';
                if (kmh > 0 && kmh < 60) gear = '1';
                else if (kmh < 110) gear = '2';
                else if (kmh < 160) gear = '3';
                else if (kmh < 210) gear = '4';
                else if (kmh < 260) gear = '5';
                else if (kmh < 310) gear = '6';
                else if (kmh >= 310) gear = '7';
                if (this.carParams.speed < 0) gear = 'R';
                
                document.getElementById('gear-val').innerText = gear;
                document.getElementById('gps-val').innerText = `X: ${Math.floor(this.car.position.x)} | Z: ${Math.floor(this.car.position.z)}`;
            }

            onResize() {
                this.camera.aspect = window.innerWidth / window.innerHeight;
                this.camera.updateProjectionMatrix();
                this.renderer.setSize(window.innerWidth, window.innerHeight);
            }

            run() {
                const animate = () => {
                    requestAnimationFrame(animate);
                    const delta = this.clock.getDelta();

                    if (!this.isPaused && this.car) {
                        this.updatePhysics(delta);
                        this.updateCamera();
                        this.updateHUD();
                    }

                    this.renderer.render(this.scene, this.camera);
                };
                animate();
            }
        }

        // --- INICIALIZAR SIMULADOR ---
        const simulator = new RacingSimulator();

        /*
         * ADICIONAL PARA ENCHER O CÓDIGO COM FUNÇÕES ÚTEIS DE AMBIENTE (EXTRAS)
         * Adicionando lógica de clima e pós-processamento manual
         */
        function applyEnvironmentalEffects(scene) {

            // const grid = new THREE.GridHelper(1000, 50, 0x000000, 0x222222);
            // scene.add(grid);
        }

    </script>
</body>
</html>
